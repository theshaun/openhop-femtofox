# NTP configuration for systemd-timesyncd.
# This board has no RTC, so SNTP sync over the network is the primary
# time source. fake-hwclock provides a reasonable approximation on
# cold boot before the network is up.
[Time]
NTP=0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org 3.pool.ntp.org
FallbackNTP=time.cloudflare.com time.google.com
